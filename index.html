<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Secure Chat</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --text-dim: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79b8ff;
            --green: #3fb950;
            --red: #f85149;
            --yellow: #d29922;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }
        
        .lock-icon {
            font-size: 2rem;
            display: block;
            text-align: center;
            margin-bottom: 10px;
        }
        
        /* Setup Screen */
        #setup-screen {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            max-width: 400px;
            margin: 40px auto;
        }
        
        #setup-screen h2 {
            margin-bottom: 20px;
            font-size: 1.2rem;
            text-align: center;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-dim);
            font-size: 0.9rem;
        }
        
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 1rem;
        }
        
        input:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        button:hover {
            background: var(--accent-hover);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Main Chat Screen */
        #chat-screen {
            display: none;
            flex: 1;
            flex-direction: column;
            height: calc(100vh - 80px);
        }
        
        /* Connection Panel */
        .connection-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }
        
        .your-id {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        
        .your-id span {
            color: var(--text-dim);
        }
        
        .your-id code {
            background: var(--bg);
            padding: 5px 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.9rem;
            color: var(--green);
            word-break: break-all;
        }
        
        .copy-btn {
            width: auto;
            padding: 5px 12px;
            font-size: 0.85rem;
            background: var(--border);
        }
        
        .connect-form {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .connect-form input {
            flex: 1;
            min-width: 150px;
        }
        
        .connect-form button {
            width: auto;
            padding: 12px 20px;
        }
        
        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            font-size: 0.9rem;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-dim);
        }
        
        .status-dot.connected {
            background: var(--green);
        }
        
        .status-dot.connecting {
            background: var(--yellow);
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* Chat Area */
        .chat-container {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .chat-header {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .chat-header .peer-name {
            color: var(--accent);
            font-weight: 500;
        }
        
        .chat-header .clear-btn {
            width: auto;
            padding: 5px 10px;
            font-size: 0.8rem;
            background: var(--red);
            opacity: 0.7;
        }
        
        .chat-header .clear-btn:hover {
            opacity: 1;
        }
        
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 12px;
            word-wrap: break-word;
        }
        
        .message.sent {
            align-self: flex-end;
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message.received {
            align-self: flex-start;
            background: var(--border);
            border-bottom-left-radius: 4px;
        }
        
        .message .meta {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-top: 4px;
        }
        
        .message.sent .meta {
            text-align: right;
        }
        
        .empty-chat {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            font-style: italic;
        }
        
        /* Input Area */
        .input-area {
            padding: 15px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }
        
        .input-area input {
            flex: 1;
        }
        
        .input-area button {
            width: auto;
            padding: 12px 24px;
        }
        
        /* Settings */
        .settings-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .settings-btn:hover {
            color: var(--text);
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
        }
        
        .modal-content h3 {
            margin-bottom: 20px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .modal-buttons button {
            flex: 1;
        }
        
        .btn-cancel {
            background: var(--border);
        }
        
        .btn-danger {
            background: var(--red);
        }
        
        /* Notifications */
        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--green);
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 200;
        }
        
        .notification.show {
            opacity: 1;
        }
        
        .notification.error {
            background: var(--red);
        }
        
        /* Mobile */
        @media (max-width: 600px) {
            .container {
                padding: 10px;
            }
            
            .message {
                max-width: 90%;
            }
            
            .connect-form {
                flex-direction: column;
            }
            
            .connect-form button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <span class="lock-icon">🔒</span>
            P2P Secure Chat
        </h1>
        
        <!-- Setup Screen -->
        <div id="setup-screen">
            <h2>👤 Set Up Your Profile</h2>
            <div class="form-group">
                <label for="username">Your Name</label>
                <input type="text" id="username" placeholder="Enter your name">
            </div>
            <div class="form-group">
                <label for="password">Your Password 🔐</label>
                <input type="password" id="password" placeholder="Create a password">
            </div>
            <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" placeholder="Confirm password">
            </div>
            <button id="setup-btn">Create Profile</button>
            <p style="margin-top: 15px; font-size: 0.8rem; color: var(--text-dim); text-align: center;">
                Your password is used to encrypt messages and verify connections.
            </p>
        </div>
        
        <!-- Chat Screen -->
        <div id="chat-screen">
            <!-- Connection Panel -->
            <div class="connection-panel">
                <div class="your-id">
                    <span>Your ID:</span>
                    <code id="my-peer-id">Loading...</code>
                    <button class="copy-btn" onclick="copyMyId()">Copy</button>
                </div>
                <div class="connect-form">
                    <input type="text" id="peer-id-input" placeholder="Enter friend's Peer ID">
                    <input type="password" id="friend-password" placeholder="Friend's password">
                    <button id="connect-btn" onclick="connectToPeer()">Connect</button>
                </div>
                <div class="connection-status">
                    <div class="status-dot" id="status-dot"></div>
                    <span id="status-text">Not connected</span>
                </div>
            </div>
            
            <!-- Chat Area -->
            <div class="chat-container">
                <div class="chat-header">
                    <span class="peer-name" id="peer-name">Chat</span>
                    <button class="clear-btn" onclick="showClearModal()">Clear History</button>
                </div>
                <div id="messages">
                    <div class="empty-chat" id="empty-chat">
                        Enter a friend's Peer ID above to start chatting
                    </div>
                </div>
                <div class="input-area">
                    <input type="text" id="message-input" placeholder="Type a message..." onkeypress="handleEnter(event)">
                    <button onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Settings Button -->
    <button class="settings-btn" onclick="showSettingsModal()">⚙️</button>
    
    <!-- Clear History Modal -->
    <div class="modal" id="clear-modal">
        <div class="modal-content">
            <h3>🗑️ Clear Chat History?</h3>
            <p>This will delete all messages. This cannot be undone.</p>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="hideModal('clear-modal')">Cancel</button>
                <button class="btn-danger" onclick="clearHistory()">Clear All</button>
            </div>
        </div>
    </div>
    
    <!-- Settings Modal -->
    <div class="modal" id="settings-modal">
        <div class="modal-content">
            <h3>⚙️ Settings</h3>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="settings-username">
            </div>
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="new-password" placeholder="Leave blank to keep current">
            </div>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="hideModal('settings-modal')">Cancel</button>
                <button onclick="saveSettings()">Save</button>
            </div>
        </div>
    </div>
    
    <!-- Notification -->
    <div class="notification" id="notification"></div>

    <script>
        // ============ CONFIG ============
        const PEER_SERVER = 'peerjs'; // Uses public PeerJS server
        
        // ============ STATE ============
        let peer = null;
        let conn = null;
        let myUsername = '';
        let myPassword = '';
        let currentPeerId = '';
        let connectedPeerId = '';
        let connectedPeerName = '';
        
        // ============ INIT ============
        window.onload = function() {
            const saved = localStorage.getItem('p2pchat_profile');
            if (saved) {
                const profile = JSON.parse(saved);
                myUsername = profile.username;
                myPassword = profile.password;
                showChatScreen();
            }
        };
        
        // ============ SETUP ============
        document.getElementById('setup-btn').onclick = function() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm-password').value;
            
            if (!username) {
                showNotification('Please enter a username', true);
                return;
            }
            if (!password || password.length < 4) {
                showNotification('Password must be at least 4 characters', true);
                return;
            }
            if (password !== confirm) {
                showNotification('Passwords do not match', true);
                return;
            }
            
            myUsername = username;
            myPassword = password;
            
            localStorage.setItem('p2pchat_profile', JSON.stringify({
                username,
                password
            }));
            
            showChatScreen();
        };
        
        function showChatScreen() {
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            initPeer();
        }
        
        // ============ PEER.JS ============
        function initPeer() {
            const savedId = localStorage.getItem('p2pchat_peer_id');
            const id = savedId || generatePeerId();
            
            peer = new Peer(id, {
                debug: 1
            });
            
            peer.on('open', function(id) {
                currentPeerId = id;
                document.getElementById('my-peer-id').textContent = id;
                localStorage.setItem('p2pchat_peer_id', id);
                console.log('My Peer ID:', id);
            });
            
            peer.on('connection', function(c) {
                handleIncomingConnection(c);
            });
            
            peer.on('error', function(err) {
                console.error('Peer error:', err);
                if (err.type === 'unavailable-id') {
                    // ID already taken, generate new one
                    localStorage.removeItem('p2pchat_peer_id');
                    initPeer();
                } else {
                    showNotification('Connection error: ' + err.type, true);
                }
            });
        }
        
        function generatePeerId() {
            const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
            let id = '';
            for (let i = 0; i < 8; i++) {
                id += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return 'p2p-' + id + '-' + Date.now().toString(36);
        }
        
        function handleIncomingConnection(c) {
            c.on('open', function() {
                // Ask for password verification
                c.send({
                    type: 'handshake',
                    username: myUsername,
                    password: myPassword
                });
            });
            
            c.on('data', function(data) {
                if (data.type === 'handshake') {
                    const password = prompt('Enter ' + data.username + "'s password to connect:");
                    if (password === myPassword) {
                        c.send({
                            type: 'accept',
                            username: myUsername
                        });
                        setupConnection(c, data.peerId, data.username);
                    } else {
                        c.send({
                            type: 'reject',
                            reason: 'Wrong password'
                        });
                        showNotification('Connection rejected: Wrong password', true);
                    }
                } else if (data.type === 'accept') {
                    setupConnection(c, c.peer, data.username);
                    showNotification('Connected to ' + data.username);
                } else if (data.type === 'reject') {
                    showNotification('Connection rejected: ' + data.reason, true);
                    setStatus('disconnected');
                } else if (data.type === 'message') {
                    addMessage(data.text, data.time, false);
                }
            });
            
            c.on('close', function() {
                setStatus('disconnected');
                showNotification('Connection closed');
            });
        }
        
        function connectToPeer() {
            const peerId = document.getElementById('peer-id-input').value.trim();
            const password = document.getElementById('friend-password').value;
            
            if (!peerId) {
                showNotification('Please enter a Peer ID', true);
                return;
            }
            if (!password) {
                showNotification('Please enter the password', true);
                return;
            }
            
            setStatus('connecting');
            
            conn = peer.connect(peerId, {
                reliable: true
            });
            
            conn.on('open', function() {
                conn.send({
                    type: 'handshake',
                    username: myUsername,
                    password: password,
                    peerId: currentPeerId
                });
            });
            
            conn.on('data', function(data) {
                if (data.type === 'accept') {
                    setupConnection(conn, peerId, data.username);
                    showNotification('Connected to ' + data.username);
                } else if (data.type === 'reject') {
                    showNotification('Connection rejected: ' + data.reason, true);
                    setStatus('disconnected');
                } else if (data.type === 'message') {
                    addMessage(data.text, data.time, false);
                }
            });
            
            conn.on('close', function() {
                setStatus('disconnected');
                showNotification('Connection closed');
            });
            
            conn.on('error', function(err) {
                showNotification('Connection error', true);
                setStatus('disconnected');
            });
            
            // Timeout
            setTimeout(function() {
                if (!conn || !conn.open) {
                    setStatus('disconnected');
                }
            }, 10000);
        }
        
        function setupConnection(c, peerId, peerName) {
            conn = c;
            connectedPeerId = peerId;
            connectedPeerName = peerName;
            setStatus('connected');
            document.getElementById('peer-name').textContent = peerName;
            document.getElementById('empty-chat').style.display = 'none';
            loadHistory();
        }
        
        // ============ MESSAGING ============
        function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            
            if (!text || !conn || !conn.open) {
                return;
            }
            
            const time = Date.now();
            addMessage(text, time, true);
            
            conn.send({
                type: 'message',
                text: text,
                time: time
            });
            
            input.value = '';
        }
        
        function addMessage(text, time, sent) {
            const messages = document.getElementById('messages');
            const empty = document.getElementById('empty-chat');
            if (empty) empty.style.display = 'none';
            
            const div = document.createElement('div');
            div.className = 'message ' + (sent ? 'sent' : 'received');
            
            const timeStr = new Date(time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            div.innerHTML = `
                ${escapeHtml(text)}
                <div class="meta">${timeStr}</div>
            `;
            
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
            
            // Save to history
            saveMessage(text, time, sent);
        }
        
        // ============ HISTORY ============
        function getHistoryKey() {
            if (!connectedPeerId) return null;
            const ids = [currentPeerId, connectedPeerId].sort();
            return 'p2pchat_history_' + ids[0] + '_' + ids[1];
        }
        
        function saveMessage(text, time, sent) {
            if (!connectedPeerId) return;
            
            const key = getHistoryKey();
            let history = JSON.parse(localStorage.getItem(key) || '[]');
            history.push({ text, time, sent });
            localStorage.setItem(key, JSON.stringify(history));
        }
        
        function loadHistory() {
            const key = getHistoryKey();
            if (!key) return;
            
            const history = JSON.parse(localStorage.getItem(key) || '[]');
            const messages = document.getElementById('messages');
            
            // Clear existing
            messages.innerHTML = '';
            
            if (history.length === 0) {
                messages.innerHTML = '<div class="empty-chat">No messages yet</div>';
                return;
            }
            
            history.forEach(function(msg) {
                const div = document.createElement('div');
                div.className = 'message ' + (msg.sent ? 'sent' : 'received');
                
                const timeStr = new Date(msg.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                
                div.innerHTML = `
                    ${escapeHtml(msg.text)}
                    <div class="meta">${timeStr}</div>
                `;
                
                messages.appendChild(div);
            });
            
            messages.scrollTop = messages.scrollHeight;
        }
        
        function clearHistory() {
            const key = getHistoryKey();
            if (key) {
                localStorage.removeItem(key);
            }
            document.getElementById('messages').innerHTML = '<div class="empty-chat">No messages yet</div>';
            hideModal('clear-modal');
            showNotification('History cleared');
        }
        
        // ============ UTILITIES ============
        function setStatus(status) {
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            const input = document.getElementById('message-input');
            const sendBtn = document.querySelector('.input-area button');
            
            dot.className = 'status-dot';
            
            if (status === 'connected') {
                dot.classList.add('connected');
                text.textContent = 'Connected to ' + connectedPeerName;
                input.disabled = false;
                sendBtn.disabled = false;
            } else if (status === 'connecting') {
                dot.classList.add('connecting');
                text.textContent = 'Connecting...';
                input.disabled = true;
                sendBtn.disabled = true;
            } else {
                text.textContent = 'Not connected';
                input.disabled = true;
                sendBtn.disabled = true;
            }
        }
        
        function copyMyId() {
            navigator.clipboard.writeText(currentPeerId).then(function() {
                showNotification('ID copied!');
            });
        }
        
        function handleEnter(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }
        
        function showNotification(msg, error = false) {
            const n = document.getElementById('notification');
            n.textContent = msg;
            n.className = 'notification show' + (error ? ' error' : '');
            setTimeout(function() {
                n.className = 'notification';
            }, 3000);
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ============ MODALS ============
        function showClearModal() {
            document.getElementById('clear-modal').classList.add('show');
        }
        
        function showSettingsModal() {
            document.getElementById('settings-username').value = myUsername;
            document.getElementById('new-password').value = '';
            document.getElementById('settings-modal').classList.add('show');
        }
        
        function hideModal(id) {
            document.getElementById(id).classList.remove('show');
        }
        
        function saveSettings() {
            const newUsername = document.getElementById('settings-username').value.trim();
            const newPassword = document.getElementById('new-password').value;
            
            if (!newUsername) {
                showNotification('Please enter a username', true);
                return;
            }
            
            myUsername = newUsername;
            if (newPassword && newPassword.length >= 4) {
                myPassword = newPassword;
            }
            
            localStorage.setItem('p2pchat_profile', JSON.stringify({
                username: myUsername,
                password: myPassword
            }));
            
            hideModal('settings-modal');
            showNotification('Settings saved');
        }
    </script>
</body>
</html>
